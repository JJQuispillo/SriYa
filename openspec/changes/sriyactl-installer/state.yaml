change: sriyactl-installer
mode: openspec
created: 2026-06-08
type: feature
description: >
  Convertir sriyactl en el instalador all-in-one + herramienta day-2, distribuido vía
  Homebrew (`brew install JJQuispillo/tap/sriyactl` + `sriyactl infra install`). Porta la
  lógica de install.sh (pin de VERSION, .env con secretos charset-safe, descarga del compose
  pin-a-tag, pull/up, espera de salud 90s, bootstrap del primer tenant) a Go. install.sh se
  deprecа a un shim delgado (instala sriyactl, luego exec `sriyactl infra install`).

decisions_locked:
  - CLI es el all-in-one (no se mantiene el bash installer en paralelo).
  - Org de GitHub = JJQuispillo (NO anomalyco); go.mod e .goreleaser.yaml deben renombrarse.
  - Docker NO es dependencia dura de brew; la CLI detecta + guía, con --auto-install opcional vía brew.

