schema: spec-driven

context: |
  Tech stack: .NET 9 SRI e-invoicing microservice (backend), Docker Compose self-host.
  New tool `sriyactl`: companion day-2 ops CLI written in Go (cobra+viper, goreleaser).
  Architecture: strict handler <-> render separation; HTTP client + docker-compose wrapper.
  Distribution: multi-arch cross-compile, brew tap, checksums. Lives in sibling repo `sriyactl/`.
  Style: AI-friendly baseline (json output, non-TTY mode, deterministic exit codes).

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
  apply:
    - Follow existing code patterns
    tdd: false
    test_command: "go test ./..."
  verify:
    test_command: "go test ./..."
    build_command: "go build ./..."
  archive:
    - Warn before merging destructive deltas
